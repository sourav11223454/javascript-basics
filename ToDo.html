<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="m-5">
        <h1 class="text-center">ToDo List</h1>
        <table class="table border border-1">
            <thead>
                <tr>
                    <th >userId</th>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Completed</th>
                </tr>
            </thead>
            <tbody id="output">
               
            </tbody>
        </table>
    </div>
</body>
<script>
    // steps for making api call using XMLHTTPRequest

    //step 1:ceate object for XMLHTTPRequest class

    const api = new XMLHttpRequest()

    //step 2:open connection to the application

    api.open("get", "https://jsonplaceholder.typicode.com/todos")

    //step 3:send request
    api.send()
    api.onreadystatechange = () => {
        console.log(api.readyState);
        if (api.readyState == 4) {
            if (api.status >= 200 && api.status < 300) {
                // console.log(api.responseText);
                const todos=JSON.parse(api.responseText)
                console.log(todos);
                todos.forEach(todo => {
                    const out=document.getElementById('output')
                    out.innerHTML+=`
                     <tr>
                    <td>${todo.userId}</td>
                    <td>${todo.id}</td>
                    <td>${todo.title}</td>
                    <td>${todo.completed}</td>
                </tr>`
                });
                
            } else {
                console.log("failed to fetch data");

            }
        }
    }


</script>

</html>
