<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: black;">
    <div class="d-flex align-items-center justify-content-center flex-column text-center" style="min-height: 40vh;">
        <h1 class="text-primary mb-4">Know About Countries</h1>
        <div class="d-flex">
            <input id="inputData" type="text" class="form-control me-2" placeholder="Enter Country Name"
                style="width:300px">
            <button class="btn btn-warning ms-3" onclick="show()">Search</button>
        </div>
    </div>
    <!-- to show result -->
    <div id="output" class="text-center p-5 mt-3 w-100">

    </div>
</body>
<script>
    const show = async () => {
        const countryName = document.getElementById('inputData').value

        try {
            const response = await fetch(`https://restcountries.com/v3.1/name/${countryName}?fullText=true`)
            if (response.status === 404) {
                alert('invalid country')
            }
            console.log(response);
            const res = await response.json()
            console.log(res);
            const countryDetails = res[0]

            const displayData = document.getElementById('output')
            displayData.innerHTML = ` <div class="container mt-4 p-4 rounded" style="background-color:#e4c9a8;">
        <div class="row align-items-center">
            <div class="col-lg-6 text-center">
                <img src="${countryDetails.flags.png}"
                    alt="flag" width="300" height="200">
                <br>
                <a href="${countryDetails.maps.googleMaps}" class="d-block mt-3">Click here to view in google map</a>
            </div>
            <div class="col-lg-6">
                <ul class="list-group">
                    <li class="list-group-item text-danger fw-bold">
                        Capital: <span class="text-dark fw-normal">${countryDetails.capital}</span>
                    </li>
                    <li class="list-group-item text-danger fw-bold">
                        Population: <span class="text-dark fw-normal">${countryDetails.population}</span>
                    </li>
                    <li class="list-group-item text-danger fw-bold">
                        Time Zone: <span class="text-dark fw-normal">${countryDetails.timezones}</span>
                    </li>
                    <li class="list-group-item text-danger fw-bold">
                        Continent: <span class="text-dark fw-normal">${countryDetails.continents}</span>
                    </li>
                    <li class="list-group-item text-danger fw-bold">
                        Languages: <span class="text-dark fw-normal">${Object.values(countryDetails.languages)}</span>
                    </li>
                    <li class="list-group-item text-danger fw-bold">
                        Currencies: <span class="text-dark fw-normal">${Object.values(countryDetails.currencies)[0].name}</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>`

        }
        catch (err) {
            console.log(err);

        }
    }
</script>

</html>
