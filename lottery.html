<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div style="min-height: 100vh;background-color: black;" class="d-flex align-items-center justify-content-center flex-column">
        <h1 class="text-danger my-5">Lottery Contest</h1>
        <button onclick="check()" class="btn btn-success">Check</button>
        <div id="output">

        </div>
    </div>
</body>
<script>
   const check=()=>{
     const LuckyContest=new Promise((resolve,reject)=>{

        const myTicketNumber=3
        const WinningNumber=Math.floor(Math.random()*10)+1
        console.log(WinningNumber);
        

        if(myTicketNumber==WinningNumber){
            resolve('you won the lottery')
        }else{
            reject('better luck next time')
        }
    })
     LuckyContest.then(res=>{
            output.innerHTML=res
            output.style.color="yellow"
        }).catch(err=>{
            output.innerHTML=err
            output.style.color="red"
        })
   }
</script>

</html>
